name: Release Obsidian Plugin

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Validate tag and manifest version
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"

          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "Tag version '$TAG' does not match manifest version '$MANIFEST_VERSION'."
            exit 1
          fi

          node -e "const versions=require('./versions.json'); const version=require('./manifest.json').version; if (!versions[version]) { console.error(\`versions.json is missing \${version}\`); process.exit(1); }"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            manifest.json
            main.js
            styles.css
